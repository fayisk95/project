<div class="dashboard-container">
  <div class="dashboard-header">
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Welcome back! Here's what's happening with your CRM.</p>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid">
    <app-kpi-card 
      *ngFor="let kpi of kpis" 
      [data]="kpi">
    </app-kpi-card>
  </div>

  <!-- Main Content Grid -->
  <div class="content-grid">
    <!-- Charts Section -->
    <div class="charts-section">
      <mat-card class="chart-card">
        <mat-card-header>
          <mat-card-title>Collections Over Time</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <app-chart type="line"></app-chart>
        </mat-card-content>
      </mat-card>

      <mat-card class="chart-card">
        <mat-card-header>
          <mat-card-title>Subscription Types</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <app-chart type="pie"></app-chart>
        </mat-card-content>
      </mat-card>
    </div>

    <!-- Sidebar Content -->
    <div class="sidebar-content">
      <app-recent-activity></app-recent-activity>
      <app-quick-actions></app-quick-actions>
    </div>
  </div>
</div>
