<mat-toolbar class="header-toolbar">
  <button mat-icon-button (click)="onMenuToggle()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="logo-container">
    <img src="https://images.pexels.com/photos/1476880/pexels-photo-1476880.jpeg?auto=compress&cs=tinysrgb&w=50&h=50&fit=crop" 
         alt="CRM Logo" class="logo">
    <span class="app-title">CRM Dashboard</span>
  </div>

  <div class="spacer"></div>

  <div class="user-info" *ngIf="currentUser">
    <span class="user-name">{{ currentUser.name }}</span>
    <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu">
      <img *ngIf="currentUser.avatar; else defaultAvatar" 
           [src]="currentUser.avatar" 
           [alt]="currentUser.name"
           class="user-avatar">
      <ng-template #defaultAvatar>
        <mat-icon>account_circle</mat-icon>
      </ng-template>
    </button>
  </div>

  <mat-menu #userMenu="matMenu">
    <div class="user-menu-header">
      <div class="user-details">
        <span class="user-menu-name">{{ currentUser?.name }}</span>
        <span class="user-menu-email">{{ currentUser?.email }}</span>
        <span class="user-menu-role">{{ currentUser?.role | titlecase }}</span>
      </div>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="onSettings()">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
