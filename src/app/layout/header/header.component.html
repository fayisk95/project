<mat-toolbar class="header-toolbar">
  <button mat-icon-button (click)="onMenuToggle()" class="menu-button">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="logo-container">
    <img src="https://images.pexels.com/photos/1476880/pexels-photo-1476880.jpeg?auto=compress&cs=tinysrgb&w=50&h=50&fit=crop" 
         alt="CRM Logo" class="logo">
    <span class="app-title">CRM Dashboard</span>
  </div>

  <div class="spacer"></div>

  <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item (click)="onSettings()">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>
</mat-toolbar>
